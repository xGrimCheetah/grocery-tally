<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Grocery Tally</title>
  <style>
    :root{--bg:#0f172a;--card:#111827;--muted:#1f2937;--text:#e5e7eb;--accent:#22c55e;--accent2:#3b82f6;--danger:#ef4444}
    *{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:920px;margin:0 auto;padding:16px}
    header{display:flex;gap:8px;align-items:center;justify-content:space-between;flex-wrap:wrap}
    h1{font-size:20px;margin:0;display:flex;gap:8px;align-items:center}
    .tabs{display:flex;gap:6px;background:var(--card);padding:6px;border-radius:14px}
    .tab{padding:8px 12px;border-radius:10px;background:transparent;border:1px solid transparent;color:#cbd5e1}
    .tab.active{background:var(--muted);border-color:#334155;color:var(--text);font-weight:600}
    .card{background:var(--card);border:1px solid #1f2937;border-radius:16px;padding:12px}
    .controls{display:flex;gap:8px;flex-wrap:wrap}
    .controls .right-controls{margin-left:auto}
    .build-actions{display:flex;gap:8px;align-items:center;justify-content:space-between;flex-wrap:wrap}
    .build-actions .right-controls{margin-left:auto}
    button{appearance:none;border:none;border-radius:12px;padding:10px 12px;font-weight:600;color:white;cursor:pointer}
    .btn{background:#334155}
    .btn:hover{filter:brightness(1.05)}
    .btn-accent{background:var(--accent)}
    .btn-accent2{background:var(--accent2)}
    .btn-danger{background:var(--danger)}
    .iconbtn{background:transparent;border:1px solid #334155;color:#cbd5e1;padding:6px 8px;border-radius:8px;line-height:1}
    .iconbtn:hover{filter:brightness(1.1)}
    .titlewrap{display:flex;gap:8px;align-items:center}
    .iconbtn.pencil{background:transparent;border:1px solid #334155;color:#94a3b8;padding:4px 6px;border-radius:8px;line-height:1;font-size:12px;opacity:0;transition:opacity .15s ease-in-out}
    .titlewrap:hover .iconbtn.pencil, .titlewrap:focus-within .iconbtn.pencil{opacity:1}
    /* brief hint on load */
    .pencil.hint{opacity:1 !important}
    input,select,textarea{background:#0b1220;color:var(--text);border:1px solid #243042;border-radius:10px;padding:10px}
    textarea{width:100%;min-height:160px;resize:vertical;font:inherit;line-height:1.4}
    .bulk-tools{margin-top:10px}
    .bulk-help{font-size:13px;line-height:1.45}
    .alpha-nav{position:sticky;top:0;z-index:5;background:var(--card);border:1px solid #243042;border-radius:14px;padding:8px;display:flex;gap:4px;flex-wrap:wrap;margin:10px 0}
    .alpha-nav button{background:#1f2937;color:#e5e7eb;padding:6px 8px;border-radius:8px;min-width:32px}
    .alpha-nav button:disabled{opacity:.3;cursor:default}
    .build-flat-list{display:flex;flex-direction:column;gap:8px}
    .build-letter-heading{font-weight:800;color:#93c5fd;margin:12px 0 0;padding:4px 2px;border-bottom:1px solid #243042}
    .build-letter-heading:first-child{margin-top:0}
    .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:10px}
    .col-12{grid-column:span 12}
    .col-6{grid-column:span 12}
    @media(min-width:680px){.col-6{grid-column:span 6}}
    .item{display:flex;align-items:center;gap:8px;justify-content:flex-start;background:#0b1220;border:1px solid #243042;border-radius:12px;padding:10px}
    .item .left{display:flex;align-items:center;gap:10px;min-width:0}
    .item .right{margin-left:auto;display:flex;gap:8px;align-items:center}
    .item.checked{opacity:.45}
    .checkmark{font-weight:700;color:var(--accent);min-width:20px;text-align:center}
    .shop-item{cursor:pointer}
    .shop-item .shop-left{display:grid;grid-template-columns:24px 44px 12px minmax(0,1fr);gap:8px;align-items:center;width:100%}
    .shop-qty{text-align:right;font-variant-numeric:tabular-nums;padding:6px 8px;border-radius:8px;background:#0a1627;border:1px solid #213045}
    .shop-sep{opacity:.65;text-align:center}
    .shop-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:left;min-width:0}
    .shop-cat-heading{font-weight:700;color:#cbd5e1;margin:12px 0 6px;padding:0 2px}
    #shopList .shop-cat-heading:first-child{margin-top:0}
    .qty,.prev-qty{width:48px;min-width:48px;text-align:center;font-variant-numeric:tabular-nums;padding:6px 8px;border-radius:8px;background:#0a1627;border:1px solid #213045}
    .prev-qty{color:#94a3b8}
    .prev-qty.empty{opacity:.55}
    .build-col-labels{display:flex;justify-content:flex-end;gap:8px;padding:6px 4px 4px;color:#94a3b8;font-size:12px}
    .build-col-labels span{text-align:center}
    .build-col-labels .qty-label,.build-col-labels .prev-label{width:48px;min-width:48px}
    .name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .cat{font-size:12px;opacity:.7}
    .row{display:flex;gap:8px;align-items:center}
    .list{display:flex;flex-direction:column;gap:8px}
    details{background:#0b1220;border:1px solid #243042;border-radius:14px;padding:8px}
    summary{cursor:pointer;font-weight:700;color:#cbd5e1}
    .spacer{height:10px}
    .muted{opacity:.8}
    .footer{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .pill{background:#0b1220;border:1px solid #243042;border-radius:999px;padding:6px 10px;font-size:12px}
    .link{color:#93c5fd;text-decoration:underline;cursor:pointer}
    .drag-handle{color:#64748b;font-weight:700;cursor:grab;user-select:none;touch-action:none}
    .category-drag-handle{display:inline-block;margin-right:8px}
    .category-title{vertical-align:middle}
    .dragging{opacity:.55}
    .drop-target{outline:2px dashed #3b82f6;outline-offset:2px}
    .swipe-wrap{position:relative;overflow:hidden;border-radius:12px;margin-top:8px}
    .list .swipe-wrap{margin-top:0}
    .swipe-content{position:relative;z-index:1;transition:transform .18s ease;touch-action:pan-y}
    .swipe-wrap.revealed .swipe-content{transform:translateX(-74px)}
    .swipe-trash{position:absolute;right:0;top:0;bottom:0;width:70px;border-radius:0 12px 12px 0;background:var(--danger);z-index:0;display:flex;align-items:center;justify-content:center;font-size:20px}
  </style>

  <!-- IMPORTANT: use RELATIVE paths for GitHub Pages -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
  <div class="wrap">
    <header>
      <h1>🛒 <span id="appTitleContainer"></span> <span class="pill" id="verPill"></span></h1>
      <div class="tabs">
        <button class="tab active" id="tabBuild">Build List</button>
        <button class="tab" id="tabShop">Shopping Mode</button>
        <button class="tab" id="tabManage">Manage Items</button>
        <button class="tab" id="tabCats">Manage Categories</button>
      </div>
    </header>

    <div class="spacer"></div>

    <!-- BUILD LIST -->
    <section id="viewBuild" class="card"></section>

    <!-- SHOPPING MODE -->
    <section id="viewShop" class="card" style="display:none"></section>

    <!-- MANAGE -->
    <section id="viewManage" class="card" style="display:none"></section>

    <!-- MANAGE CATEGORIES -->
    <section id="viewCats" class="card" style="display:none">
      <div class="row" style="gap:6px;flex-wrap:wrap">
        <input id="newCatName" placeholder="Category name" style="flex:2" />
        <button class="btn-accent" id="btnAddCat">Add Category</button>
      </div>
      <div class="spacer"></div>
      <div id="catList"></div>
    </section>

    <div class="spacer"></div>
    <div class="card footer">
      <span class="muted">Tap <span class="pill">+</span> to add, <span class="pill">–</span> to reduce. “Finished” opens Shopping Mode. Categories/items follow your custom order.</span>
      <span class="pill" id="verPillFooter"></span>
      <div class="muted" id="fileNameHint"></div>
    </div>
  </div>

  <script>
(function(){
  'use strict';

  // ===== Version =====
  let APP_VERSION = "1.29.0"; // Alphabetical Build List with sticky quick-jump index

  // ===== Storage & State =====
  const STORE_KEY = 'grocery_tally_v2';
  const CLOSED_CATS_KEY = 'manage_closed_cats';       // Manage Items collapsed
  const BUILD_CLOSED_CATS_KEY = 'build_closed_cats';   // Build List collapsed
  const SHOP_CLOSED_CATS_KEY = 'shop_closed_cats';       // legacy Shopping Mode collapsed state
  const LEGACY_OPEN_KEY = 'manage_open_cats';          // legacy migration only
  const SELECTED_CAT_KEY = 'manage_selected_cat';
  const DEFAULT_CATS = ["Produce","Dairy","Bakery","Meat","Frozen","Pantry","Beverages","Household","Other"];

  let state = load() || { title: "Grocery Tally", categories: DEFAULT_CATS.slice(), items: [] };
  // Safety: ensure structure
  if(!state || !Array.isArray(state.categories)) state = { title: "Grocery Tally", categories: DEFAULT_CATS.slice(), items: [] };
  if(!Array.isArray(state.items)) state.items = [];
  if(!state.title) state.title = "Grocery Tally";

  let closedCats = getClosedCats();
  let buildClosedCats = getBuildClosedCats();
  let shopClosedCats = getShopClosedCats(); // legacy only; Shopping Mode no longer uses accordions
  let manageSelectedCat = localStorage.getItem(SELECTED_CAT_KEY) || '';

  function id(){ return Math.random().toString(36).slice(2,10) }
  function save(){ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
  function load(){ try{ return JSON.parse(localStorage.getItem(STORE_KEY)); }catch(e){ return null } }

  function allCurrentCatsClosedSet(){
    return new Set(state.categories);
  }
  function getClosedCats(){
    // v1.23.0+: start Manage Items collapsed every time the app first loads.
    const closed = allCurrentCatsClosedSet();
    try{
      localStorage.removeItem(LEGACY_OPEN_KEY);
      localStorage.setItem(CLOSED_CATS_KEY, JSON.stringify([...closed]));
    }catch(e){}
    return closed;
  }
  function setClosedCats(set){ try{ localStorage.setItem(CLOSED_CATS_KEY, JSON.stringify([...set])); }catch(e){} }
  function getBuildClosedCats(){
    // v1.23.0+: start Build List collapsed every time the app first loads.
    const closed = allCurrentCatsClosedSet();
    try{ localStorage.setItem(BUILD_CLOSED_CATS_KEY, JSON.stringify([...closed])); }catch(e){}
    return closed;
  }
  function setBuildClosedCats(set){ try{ localStorage.setItem(BUILD_CLOSED_CATS_KEY, JSON.stringify([...set])); }catch(e){} }
  function getShopClosedCats(){
    // v1.23.1+: Shopping Mode no longer uses category accordions.
    // Remove old saved collapse state so it cannot hide active shopping items.
    try{ localStorage.removeItem(SHOP_CLOSED_CATS_KEY); }catch(e){}
    return new Set();
  }
  function setShopClosedCats(set){ try{ localStorage.setItem(SHOP_CLOSED_CATS_KEY, JSON.stringify([...set])); }catch(e){} }

  function scrollOpenedCategoryIntoView(sec){
    if(!sec || !sec.open) return;
    const runScroll = ()=>{
      try{
        sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }catch(e){
        sec.scrollIntoView(true);
      }
    };
    try{
      requestAnimationFrame(()=> setTimeout(runScroll, 0));
    }catch(e){
      setTimeout(runScroll, 0);
    }
  }

  // ===== Helpers =====
  function setVersionPills(){
    const a=document.getElementById('verPill'); if(a) a.textContent=`v${APP_VERSION}`;
    const b=document.getElementById('verPillFooter'); if(b) b.textContent=`v${APP_VERSION}`;
  }
  window.setVersionPills = setVersionPills;
  function renderTitle(){
    const wrap = document.getElementById('appTitleContainer');
    if(!wrap) return;
    wrap.innerHTML = '';

    const titleText = state.title || 'Grocery Tally';

    const titleWrap = document.createElement('span');
    titleWrap.className = 'titlewrap';

    const nameSpan = document.createElement('span');
    nameSpan.id = 'appTitle';
    nameSpan.textContent = titleText;

    const editBtn = document.createElement('button');
    editBtn.className = 'iconbtn pencil';
    editBtn.title = 'Rename list';
    editBtn.setAttribute('aria-label','Rename list');
    editBtn.textContent = '✏️';

    const input = document.createElement('input');
    input.value = titleText;
    input.style.display = 'none';

    const saveBtn = document.createElement('button');
    saveBtn.className = 'btn-accent';
    saveBtn.textContent = 'Save';
    saveBtn.style.display = 'none';

    const cancelBtn = document.createElement('button');
    cancelBtn.className = 'btn';
    cancelBtn.textContent = 'Cancel';
    cancelBtn.style.display = 'none';

    function enterEdit(){
      nameSpan.style.display = 'none';
      editBtn.style.display = 'none';
      input.style.display = 'inline-block';
      saveBtn.style.display = 'inline-block';
      cancelBtn.style.display = 'inline-block';
      input.focus(); input.select();
    }
    function exitEdit(){
      nameSpan.style.display = 'inline';
      editBtn.style.display = 'inline-block';
      input.style.display = 'none';
      saveBtn.style.display = 'none';
      cancelBtn.style.display = 'none';
      input.value = state.title || 'Grocery Tally';
    }

    // Access: pencil click OR title click both enter edit
    editBtn.onclick = enterEdit;
    nameSpan.onclick = enterEdit;
    cancelBtn.onclick = exitEdit;
    input.addEventListener('keydown', (e)=>{
      if(e.key==='Enter'){ e.preventDefault(); saveBtn.click(); }
      else if(e.key==='Escape'){ e.preventDefault(); cancelBtn.click(); }
    });

    saveBtn.onclick = ()=>{
      const newName = input.value.trim();
      if(!newName){ alert('List name cannot be empty.'); return }
      state.title = newName;
      save();
      nameSpan.textContent = state.title;
      document.title = `${state.title} v${APP_VERSION}`;
      setVersionPills();
      exitEdit();
    };

    titleWrap.appendChild(nameSpan);
    titleWrap.appendChild(editBtn);
    titleWrap.appendChild(input);
    titleWrap.appendChild(saveBtn);
    titleWrap.appendChild(cancelBtn);

    wrap.appendChild(titleWrap);

    // Briefly reveal pencil as a hint
    editBtn.classList.add('hint');
    setTimeout(()=>{ editBtn.classList.remove('hint'); }, 1500);

    document.title = `${titleText} v${APP_VERSION}`;
    setVersionPills();
  }
  function groupBy(arr, key){ return arr.reduce((acc,x)=>{ (acc[x[key]] ||= []).push(x); return acc },{}) }
  function cleanText(str){ return (str || '').trim().replace(/\s+/g, ' ') }
  function normalizeText(str){ return cleanText(str).toLowerCase() }
  function findCategoryByName(name){
    const target = normalizeText(name);
    if(!target) return '';
    return state.categories.find(c => normalizeText(c) === target) || '';
  }
  function ensureCategory(name){
    const cleaned = cleanText(name);
    if(!cleaned) return { name:'', created:false };
    const existing = findCategoryByName(cleaned);
    if(existing) return { name: existing, created:false };
    state.categories.push(cleaned);
    closedCats.add(cleaned);
    buildClosedCats.add(cleaned);
    setClosedCats(closedCats);
    setBuildClosedCats(buildClosedCats);
    return { name: cleaned, created:true };
  }
  function findItemInCategory(name, cat){
    const target = normalizeText(name);
    return state.items.find(i => i.cat === cat && normalizeText(i.name) === target) || null;
  }
  function previousRunValue(it){
    const val = Number(it && it.prevQty);
    return Number.isFinite(val) && val > 0 ? val : 0;
  }
  function previousRunText(it){
    const val = previousRunValue(it);
    return val > 0 ? String(val) : '—';
  }
  function alphaKeyForItem(it){
    const first = cleanText(it && it.name).charAt(0).toUpperCase();
    return /^[A-Z]$/.test(first) ? first : '#';
  }
  function buildListSort(a,b){
    const ak = alphaKeyForItem(a);
    const bk = alphaKeyForItem(b);
    const keyOrder = (key) => key === '#' ? '0' : '1' + key;
    const byKey = keyOrder(ak).localeCompare(keyOrder(bk));
    if(byKey !== 0) return byKey;
    const an = normalizeText(a && a.name);
    const bn = normalizeText(b && b.name);
    const byName = an.localeCompare(bn);
    if(byName !== 0) return byName;
    const byCat = catIndex(a.cat) - catIndex(b.cat);
    if(byCat !== 0) return byCat;
    return sortItems(a,b);
  }
  function scrollToBuildLetter(letter){
    const idPart = letter === '#' ? 'num' : letter;
    const target = document.getElementById('build-letter-' + idPart);
    if(!target) return;
    try{
      target.scrollIntoView({ behavior:'smooth', block:'start' });
    }catch(e){
      target.scrollIntoView(true);
    }
  }
  function nonZero(){ return state.items.filter(i=>i.qty>0) }
  function zeroAll(){
    const resettable = state.items.filter(i=>i.qty>0 || i.checked);
    if(!resettable.length){
      alert('Nothing to reset.');
      return;
    }
    if(!confirm('Reset all quantities to 0 and clear checked status?')){
      return;
    }
    state.items.forEach(i=>{
      i.qty = 0;
      i.checked = false;
    });
    save();
    try{ renderBuild(); renderShop(); }catch(e){}
  }
  function resetCheckmarks(){
    const checked = state.items.filter(i=>i.checked);
    if(!checked.length){
      alert('No checkmarks to reset.');
      return;
    }
    checked.forEach(i=>{
      i.checked = false;
    });
    save();
    try{
      renderBuild();
      renderShop();
    }catch(e){
      console.error(e);
    }
  }
  function commitRun(){
    const checked = state.items.filter(i=>i.checked && i.qty > 0);
    if(!checked.length){
      alert('No checked shopping items with quantities to commit.');
      return;
    }
    const totalQty = checked.reduce((sum, i)=> sum + (Number(i.qty) || 0), 0);
    const itemWord = checked.length === 1 ? 'item' : 'items';
    if(!confirm(`Commit this grocery run?\n\nThis will reset Previous Run to 0 for all items, save ${checked.length} checked ${itemWord} as this run's purchased quantities, clear those checked quantities to 0, and leave unchecked current quantities unchanged.`)){
      return;
    }

    // Previous Run represents the most recently committed shopping trip.
    // That means items not purchased in this committed run must show 0,
    // even if they were purchased in an earlier run and even if they are
    // not visible in Shopping Mode because their current quantity is 0.
    state.items.forEach(i=>{
      i.prevQty = 0;
    });

    checked.forEach(i=>{
      i.prevQty = Number(i.qty) || 0;
      i.qty = 0;
      i.checked = false;
    });
    save();
    try{
      renderBuild();
      renderShop();
      alert(`Run committed.\nSaved checked items: ${checked.length}\nSaved total quantity: ${totalQty}\nItems not purchased this run now show Previous Run as 0.`);
    }catch(e){
      console.error(e);
    }
  }
  function catIndex(c){ const i = state.categories.indexOf(c); return i === -1 ? 9999 : i }
  function sortItems(a,b){ const ci=catIndex(a.cat)-catIndex(b.cat); if(ci!==0) return ci; const ap=typeof a.pos==='number'?a.pos:1e9; const bp=typeof b.pos==='number'?b.pos:1e9; if(ap!==bp) return ap-bp; return a.name.localeCompare(b.name) }
  function ensurePositions(){ const byCat=groupBy(state.items,'cat'); Object.keys(byCat).forEach(cat=>{ let idx=0; byCat[cat].sort((a,b)=>{ const ap=typeof a.pos==='number'?a.pos:1e9; const bp=typeof b.pos==='number'?b.pos:1e9; if(ap!==bp) return ap-bp; return a.name.localeCompare(b.name)}).forEach(it=>{ if(typeof it.pos!=='number') it.pos=idx++; else idx=Math.max(idx,it.pos+1)}); byCat[cat].sort((a,b)=>a.pos-b.pos).forEach((it,i)=>it.pos=i) }) }
  function nextPos(cat){ const list=state.items.filter(i=>i.cat===cat); return list.length? Math.max(...list.map(i=> typeof i.pos==='number'?i.pos:-1))+1 : 0 }
  function itemsInCategory(cat){ return state.items.filter(i=>i.cat===cat).sort(sortItems) }
  function reindexCategory(cat){ itemsInCategory(cat).forEach((it,i)=> it.pos=i) }
  function moveItemToCategory(itemId, targetCat, targetIndex){
    const it = state.items.find(x=>x.id===itemId);
    if(!it || !state.categories.includes(targetCat)) return false;
    const oldCat = it.cat;
    const targetItems = itemsInCategory(targetCat).filter(x=>x.id!==itemId);
    let insertAt = Number(targetIndex);
    if(!Number.isFinite(insertAt)) insertAt = targetItems.length;
    insertAt = Math.max(0, Math.min(insertAt, targetItems.length));
    it.cat = targetCat;
    targetItems.splice(insertAt, 0, it);
    targetItems.forEach((x,i)=> x.pos=i);
    if(oldCat !== targetCat) reindexCategory(oldCat);
    return true;
  }
  function deleteItemById(itemId){
    const it = state.items.find(x=>x.id===itemId);
    if(!it) return;
    const oldCat = it.cat;
    state.items = state.items.filter(x=>x.id!==itemId);
    reindexCategory(oldCat);
    save();
    try{ renderManage(); renderBuild(); renderShop(); }catch(e){ console.error(e) }
  }
  function rerenderItemViews(){
    try{ renderManage(); renderBuild(); renderShop(); }catch(e){ console.error(e) }
  }
  let draggedItemId = null;
  let draggedCategoryName = null;
  function isCategoryDrag(e){
    if(draggedCategoryName) return true;
    try{
      return Array.from(e.dataTransfer.types || []).includes('application/x-grocery-category');
    }catch(err){
      return false;
    }
  }
  function getDragItemId(e){
    if(isCategoryDrag(e)) return '';
    try{ return e.dataTransfer.getData('text/plain') || draggedItemId; }catch(err){ return draggedItemId }
  }
  function getDragCategoryName(e){
    try{ return e.dataTransfer.getData('application/x-grocery-category') || draggedCategoryName; }catch(err){ return draggedCategoryName }
  }
  function moveCategoryNear(sourceCat, targetCat, placeAfter){
    if(!sourceCat || !targetCat || sourceCat === targetCat) return false;
    const sourceIndex = state.categories.indexOf(sourceCat);
    const targetIndex = state.categories.indexOf(targetCat);
    if(sourceIndex < 0 || targetIndex < 0) return false;
    const moved = state.categories.splice(sourceIndex, 1)[0];
    let insertAt = state.categories.indexOf(targetCat);
    if(placeAfter) insertAt += 1;
    insertAt = Math.max(0, Math.min(insertAt, state.categories.length));
    state.categories.splice(insertAt, 0, moved);
    return true;
  }
  function rerenderCategoryOrderViews(){
    try{ renderCats(); renderManage(); renderBuild(); renderShop(); }catch(e){ console.error(e) }
  }
  function attachCategoryDrag(handleEl, cat, dragClassEl){
    if(!handleEl) return;
    handleEl.draggable = true;
    handleEl.dataset.category = cat;
    handleEl.addEventListener('click', e=> e.stopPropagation());
    handleEl.addEventListener('dragstart', e=>{
      draggedCategoryName = cat;
      const visual = dragClassEl || handleEl;
      visual.classList.add('dragging');
      try{

  function attachSwipeToReveal(wrap, content){
    let startX=0, startY=0, currentX=0, tracking=false, swiping=false;
    content.addEventListener('pointerdown', e=>{
      if(e.button !== undefined && e.button !== 0) return;
      if(e.target && e.target.closest && e.target.closest('.drag-handle,button,input,select')) return;
      tracking=true; swiping=false;
      startX=e.clientX; startY=e.clientY; currentX=startX;
    });
    content.addEventListener('pointermove', e=>{
      if(!tracking) return;
      currentX=e.clientX;
      const dx=currentX-startX;
      const dy=e.clientY-startY;
      if(!swiping && Math.abs(dx)>18 && Math.abs(dx)>Math.abs(dy)*1.25){
        swiping=true;
        try{ content.setPointerCapture(e.pointerId); }catch(err){}
      }
      if(swiping){
        e.preventDefault();
        const offset=Math.max(-74, Math.min(0, dx));
        content.style.transform=`translateX(${offset}px)`;
      }
    });
    function finish(){
      if(!tracking) return;
      const dx=currentX-startX;
      tracking=false;
      if(swiping){
        content.style.transform='';
        if(dx < -36){
          document.querySelectorAll('.swipe-wrap.revealed').forEach(el=>{ if(el!==wrap) el.classList.remove('revealed'); });
          wrap.classList.add('revealed');
        } else if(dx > 24){
          wrap.classList.remove('revealed');
        }
      } else if(wrap.classList.contains('revealed')){
        wrap.classList.remove('revealed');
      }
      swiping=false;
    }
    content.addEventListener('pointerup', finish);
    content.addEventListener('pointercancel', finish);
  }

      const del=document.createElement('button'); del.className='btn-danger'; del.textContent='Delete';

      function enterEdit(){ label.style.display='none'; input.style.display='block'; edit.style.display='none'; del.style.display='none'; saveBtn.style.display='inline-block'; cancelBtn.style.display='inline-block'; input.focus(); input.select(); }
      function exitEdit(){ label.style.display='block'; input.style.display='none'; edit.style.display='inline-block'; del.style.display='inline-block'; saveBtn.style.display='none'; cancelBtn.style.display='none'; input.value = label.textContent; }

      edit.onclick = enterEdit; cancelBtn.onclick = exitEdit;
      // Enter-to-save & Esc-to-cancel while renaming a category
      input.addEventListener('keydown', (e)=>{
        if(e.key === 'Enter'){ e.preventDefault(); saveBtn.click(); }
        else if(e.key === 'Escape'){ e.preventDefault(); cancelBtn.click(); }
      });
      saveBtn.onclick = ()=>{
        const newName = input.value.trim(); if(!newName){ alert('Category name cannot be empty.'); return }
        const dup = state.categories.some((cat,idx)=> idx!==i && cat.toLowerCase()===newName.toLowerCase()); if(dup){ alert('That category already exists.'); return }
        const oldName = state.categories[i]; state.categories[i] = newName; state.items.forEach(it=>{ if(it.cat===oldName) it.cat=newName; });
        if(closedCats.has(oldName)){ closedCats.delete(oldName); closedCats.add(newName); setClosedCats(closedCats); }
        if(buildClosedCats.has(oldName)){ buildClosedCats.delete(oldName); buildClosedCats.add(newName); setBuildClosedCats(buildClosedCats); }
        save(); label.textContent=newName; exitEdit(); renderManage(); renderBuild(); renderShop();
      };
      del.onclick = ()=>{ const removed = state.categories.splice(i,1)[0]; if(closedCats.has(removed)){ closedCats.delete(removed); setClosedCats(closedCats); } if(buildClosedCats.has(removed)){ buildClosedCats.delete(removed); setBuildClosedCats(buildClosedCats); } save(); renderCats(); renderManage(); renderBuild(); renderShop(); };

      row.appendChild(left); left.appendChild(label); left.appendChild(input);
      row.appendChild(right); right.appendChild(edit); right.appendChild(saveBtn); right.appendChild(cancelBtn); right.appendChild(del);
      cl.appendChild(row);
    });

    // Drag & drop reorder
    let dragIndex=null;
    cl.querySelectorAll('.item').forEach(el=>{
      el.addEventListener('dragstart', e=>{ dragIndex=parseInt(e.currentTarget.dataset.index,10); e.dataTransfer.effectAllowed='move'; });
      el.addEventListener('dragover', e=>{ e.preventDefault(); e.dataTransfer.dropEffect='move'; });
      el.addEventListener('drop', e=>{ e.preventDefault(); const targetIndex=parseInt(e.currentTarget.dataset.index,10); if(isNaN(dragIndex)||isNaN(targetIndex)||dragIndex===targetIndex) return; const moved=state.categories.splice(dragIndex,1)[0]; state.categories.splice(targetIndex,0,moved); save(); renderCats(); renderManage(); renderBuild(); renderShop(); });
    });

    document.getElementById('btnAddCat').onclick = ()=>{
      const name=cleanText(document.getElementById('newCatName').value); if(!name) return;
      const result = ensureCategory(name);
      if(!result.created){ alert('Category already exists'); return }
      save(); renderCats(); renderManage(); document.getElementById('newCatName').value='';
    };
  }

  function renderAll(){ ensurePositions(); renderTitle(); renderBuild(); renderShop(); renderManage(); renderCats(); setVersionPills(); }

  // Initial render
  try{ renderTitle(); }catch(e){}
  try{ ensurePositions(); renderBuild(); renderShop(); renderManage(); renderCats(); setTab('build'); }catch(e){ console.error(e) }
  try{ setVersionPills(); }catch(e){}
})();
  </script>

  
  <!-- Version bootstrap + SW registration -->
  <script>
  (function(){
    function setPills(ver){
      var a = document.getElementById('verPill'); if (a) a.textContent = 'v' + ver;
      var b = document.getElementById('verPillFooter'); if (b) b.textContent = 'v' + ver;
    }
    async function getVersion(){
      try {
        const res = await fetch('version.json', { cache: 'no-store' });
        if (res.ok) {
          const data = await res.json();
          return data && data.version ? data.version : null;
        }
      } catch {}
      return null;
    }
    async function registerSW(ver){
      if (!('serviceWorker' in navigator)) return;
      try {
        const v = ver || (typeof APP_VERSION !== 'undefined' ? APP_VERSION : '');
        await navigator.serviceWorker.register('service-worker.js' + (v ? ('?v=' + encodeURIComponent(v)) : ''));
      } catch (e) {
        console.error(e);
      }
    }
    (async () => {
      const v = await getVersion();
      if (v) {
        try { APP_VERSION = v; } catch {}
        setPills(v);
        // update title suffix if present
        try {
          const m = document.title.match(/v\d+\.\d+\.\d+$/);
          if (m) document.title = document.title.replace(/v\d+\.\d+\.\d+$/, 'v' + v);
        } catch {}
      }
      // mirror original behavior: register on load
      window.addEventListener('load', () => registerSW(v));
    })();
  })();
  </script>
